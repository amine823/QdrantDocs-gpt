services:
  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage

  dev:
    image: mcr.microsoft.com/devcontainers/python:3.11
    container_name: dev
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: sleep infinity
